services:
  ethereum:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: >
      sh -c 'exec anvil -p 8545 --host 0.0.0.0 --chain-id 31337 --silent'
    ports:
      - '8545:8545'

  aztec:
    image: 'aztecprotocol/aztec:4.2.0-aztecnr-rc.2'
    entrypoint: ['node', '--no-warnings', '/usr/src/yarn-project/aztec/dest/bin/index.js', 'start', '--local-network']
    ports:
      - '8079:8079'
      - '8080:8080'
    environment:
      DEBUG:
      ETHEREUM_HOSTS: http://ethereum:8545
      L1_CHAIN_ID: 31337
      ARCHIVER_POLLING_INTERVAL_MS: 50
      P2P_BLOCK_CHECK_INTERVAL_MS: 50
      SEQ_TX_POLLING_INTERVAL_MS: 50
      WS_BLOCK_CHECK_INTERVAL_MS: 50
      PXE_BLOCK_POLLING_INTERVAL_MS: 50
      ARCHIVER_VIEM_POLLING_INTERVAL_MS: 500
    volumes:
      - ./log:/usr/src/yarn-project/aztec-sandbox/log:rw